<!DOCTYPE html>
<html>

<head>
    <title>OAM Uploader</title>
    <link href="./styles.css" rel="stylesheet">
    <link href="https://releases.transloadit.com/uppy/v5.2.1/uppy.min.css" rel="stylesheet">
</head>
<script src="./scripting.js" defer></script>
<header>
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/upload">Upload</a>
    <a href="/docs">Docs</a>
</header>
<body>
    <h1>Upload</h1>
    <div id="uppy-container">
        <form id="metadata">
            <h3>Additional information</h3>
            <label for="title">Title*</label>
            <input type="text" name="title" placeholder="Upload name" required/>
            
            <label for="platform">Platform*</label>
            <select name="platform" required>
                <option value="satellite">Satellite</option>
                <option value="aircraft">Aircraft</option>
                <option value="uav">UAV</option>
                <option value="balloon">Balloon</option>
                <option value="Kite">Kite</option>
            </select>
            
            <label for="sensor">Sensor</label>
            <input type="text" name="sensor" placeholder="Camera or sensor model"/>
            
            <label for="acqdatestart">Acquisition Date (start)*</label>
            <input type="date" name="acqdatestart" required/>
            
            <label for="acqdateend">Acquisition Date (end)</label>
            <input type="date" name="acqdateend"/>
            
            <label for="provider">Provider*</label>
            <input type="text" name="provider" placeholder="Your name or organization" required/>
            
            <!-- TODO: Default to user login email -->
            <label for="contact">Contact*</label>
            <input type="email" name="contact" placeholder="Your email" required/>
            
            <label for="license">License*</label>
            <select name="license" required>
                <option value="0">CC-BY 4.0</option>
                <option value="1">CC BY-NC 4.0</option>
                <option value="2">CC BY-SA 4.0</option>
            </select>
            
            <label for="tags">Tags</label>
            <input type="text" name="tags" placeholder="Comma separated tags"/>
            *Required
        </form>
        <div id="uppy"></div>
    </div>

    <script type="module">
        import { Uppy, Dashboard, AwsS3 } from "https://releases.transloadit.com/uppy/v5.2.1/uppy.min.mjs";

        const uppy = new Uppy({
            restrictions: {
                allowedFileTypes: ['.tif', '.tiff'],
            },
        });

        uppy.use(Dashboard, {
            target: '#uppy',
            inline: true,
            proudlyDisplayPoweredByUppy: false,
            width: '100%',
            height: 450,
        });

        uppy.use(AwsS3, {
            shouldUseMultipart: true,
            limit: 1, // May change later, but for now I would imagine only 1
            // TODO: Implement companion for Google Drive and DropBox upload, requires changes to publicServer as well...
            // TODO: Send userid using headers tag

            async createMultipartUpload(file) {
                const res = await fetch('/api/v1/s3/createmultipart', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        filename: file.name,
                        contenttype: file.type,
                        metadata: {
                            "key": "value" //TODO: Link to form
                        }
                    }),
                });
                if (!res.ok) throw new Error('Failed to create multipart upload');
                return await res.json();
            },

            async signPart(file, { uploadId, key, partNumber, signal }) { // Creates signed URL to upload files to
                const res = await fetch('/api/v1/s3/signedurl', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        'uploadid': uploadId, 
                        'key': key, 
                        'partnumber': partNumber 
                    }),
                    signal,
                });
                if (!res.ok) throw new Error('Failed to sign part');
                return await res.json(); // { url }
            },

            async listParts(file, { uploadId, key, signal }) {
                const res = await fetch('/api/v1/s3/listparts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        'uploadid': uploadId, 
                        'key': key 
                    }),
                    signal,
                });
                if (!res.ok) throw new Error('Failed to list parts');
                return await res.json(); // [{ PartNumber, Size, ETag }]
            },

            async completeMultipartUpload(file, { uploadId, key, parts }) {
                const res = await fetch('/api/v1/s3/completemultipart', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        'uploadid': uploadId, 
                        'key': key, 
                        'parts': parts 
                    }),
                });
                if (!res.ok) throw new Error('Failed to complete multipart upload');
                return await res.json();
            },

            async abortMultipartUpload(file, { uploadId, key }) {
                await fetch('/api/v1/s3/abortmultipart', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        'uploadid': uploadId, 
                        'key': key 
                    }),
                });
            },
        });

        uppy.on('complete', (result) => {
            console.log('Upload complete. Successful files:', result.successful);
            console.log('Failed files:', result.failed);
        });

        uppy.on('error', (error) => {
            console.error('Upload error:', error);
        });
    </script>
</body>
</html>
