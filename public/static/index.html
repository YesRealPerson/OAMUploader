<script src="./scripting.js" defer></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@hotosm/hanko-auth@0.5.2/dist/hanko-auth.esm.js"></script>
<script defer>
	const main = async () => {
		let response = await (await fetch("/api/v1/getuser")).json()
		console.log(response)
		if(response.status == 0){
			document.getElementById("status").innerText = "Not logged in!"
		}else{
			document.getElementById("status").innerText = `Hello, ${response.user}!`
		}
	}
	main()
</script>
<header style="display: flex; justify-content: space-between;">
	<div>
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/upload">Upload</a>
    <a href="/docs">Docs</a>
	</div>
	<div>
		<span id="status">Loading</span>
	</div>
</header>
<body>
    <h1>Home</h1>
	<div style="height: 50vh; display: flex; align-items: center;">
		<div style="width: 100%;text-align: center;">
			<h2>Hello!</h2>
      <hotosm-auth hanko-url="https://dev.login.hotosm.org" osm-required redirect-after-login="/"></hotosm-auth>
			<a href="/api/v1/login" id="status">Login with OpenStreetMap</a>
		</div>
	</div>
</body>
