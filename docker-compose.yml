version: "1.0"
name: "oam-uploader"
services:
  public:
    build:
      context: . 
      dockerfile: ./public/Dockerfile.dev
    image: oam-uploader-public:latest
    volumes:
      - ./public:/app
      - ./temporary:/temporary
    ports:
      - "8080:8080"
  private:
    build:
      context: .
      dockerfile: ./private/Dockerfile.dev
    image: oam-uploader-private:latest
    volumes:
      - ./private:/app
      - ./temporary:/temporary
    ports:
      - "7070:7070"